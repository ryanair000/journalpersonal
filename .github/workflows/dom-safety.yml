name: DOM rendering safety

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  reject-unsafe-html-sinks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check JavaScript DOM rendering
        shell: bash
        run: |
          set -euo pipefail
          matches=$(grep -RInE \
            --include='*.js' \
            --exclude='quality-check.mjs' \
            --exclude-dir='.git' \
            '(innerHTML[[:space:]]*=|outerHTML[[:space:]]*=|insertAdjacentHTML[[:space:]]*\(|document\.write[[:space:]]*\()' \
            . || true)

          if [ -n "$matches" ]; then
            echo "Unsafe HTML rendering APIs found:"
            echo "$matches"
            echo "Use createElement, textContent, createTextNode, and replaceChildren instead."
            exit 1
          fi

          echo "No unsafe HTML rendering APIs found."
