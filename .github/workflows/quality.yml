name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diagnose:
    name: ${{ matrix.label }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Syntax and JSON
            pattern: 'JavaScript syntax check failed|invalid JSON'
          - label: Structure and IDs
            pattern: 'unexpected closing brace|unclosed brace|unresolved merge marker|duplicate id'
          - label: Local references
            pattern: 'missing local asset|duplicate module label|duplicate module path'
          - label: Unsafe browser APIs
            pattern: 'innerHTML assignment|outerHTML assignment|insertAdjacentHTML call|document\.write call|eval call|Function constructor|direct browser prompt/confirm'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run audit and classify findings
        shell: bash
        env:
          FINDING_PATTERN: ${{ matrix.pattern }}
        run: |
          set +e
          npm run quality > quality-report.txt 2>&1
          set -e

          if grep -Eq "$FINDING_PATTERN" quality-report.txt; then
            cat quality-report.txt
            exit 1
          fi

          echo "No findings in this category."
