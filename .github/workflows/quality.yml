name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Repository quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run quality gate
        id: quality
        shell: bash
        run: |
          set +e
          npm run quality 2>&1 | tee quality-report.txt
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload quality report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-report
          path: quality-report.txt
          if-no-files-found: error
          retention-days: 14

      - name: Enforce quality result
        if: steps.quality.outputs.exit_code != '0'
        run: |
          echo "The repository quality gate reported errors. Review the job summary or downloaded report."
          exit 1
