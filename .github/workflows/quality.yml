name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Repository quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run quality gate
        id: quality
        shell: bash
        run: |
          set +e
          npm run quality 2>&1 | tee quality-report.txt
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload quality report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-report
          path: quality-report.txt
          if-no-files-found: error
          retention-days: 14

      - name: Publish pull request report
        if: always() && github.event_name == 'pull_request'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          marker='<!-- repository-quality-gate -->'
          {
            echo "$marker"
            echo '## Repository quality gate'
            echo
            echo '```text'
            tail -c 55000 quality-report.txt
            echo
            echo '```'
          } > quality-comment.md

          existing_id=$(gh api \
            "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
            --paginate \
            --jq ".[] | select(.body | contains(\"$marker\")) | .id" \
            | head -n 1)

          if [ -n "$existing_id" ]; then
            gh api \
              --method PATCH \
              "repos/${GITHUB_REPOSITORY}/issues/comments/${existing_id}" \
              -f body="$(cat quality-comment.md)"
          else
            gh pr comment "$PR_NUMBER" --body-file quality-comment.md
          fi

      - name: Enforce quality result
        if: steps.quality.outputs.exit_code != '0'
        run: |
          echo "The repository quality gate reported errors. Review the pull request report or downloaded artifact."
          exit 1
